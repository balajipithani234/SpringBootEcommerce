spring.application.name=CloudGateWay
server.port=8093
spring.main.web-application-type=reactive

# Order Service Route
spring.cloud.gateway.routes[0].id=ORDERSERVICE
spring.cloud.gateway.routes[0].uri=lb://ORDERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/order/**
#filrers circuit breaker
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=ORDERSERVICE
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/orderServiceFallBack

# Product Service Route
spring.cloud.gateway.routes[1].id=PRODUCTSERVICE
spring.cloud.gateway.routes[1].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/product/**
#filrers circuit breaker
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=PRODUCTSERVICE
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/productServiceFallBack


# Payment Service Route
spring.cloud.gateway.routes[2].id=PAYMENTSERVICE
spring.cloud.gateway.routes[2].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/payment/**

#filrers circuit breaker
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=PAYMENTSERVICE
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/paymentServiceFallBack

eureka.client.service-url.defaultZone=http://localhost:8090/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true